<body>
<header class="header">
    <div class="logo">
      <img src="assets/CRIS_logo.png" alt="CRIS Logo" class="logo-image">
    </div>
  </header>


<div class="email-wrapper">
  <h2>Send Email</h2>

  <form (ngSubmit)="sendEmail()" #emailForm="ngForm">
    <label for="subject">Subject:</label>
    <input
      type="text"
      id="subject"
      name="subject"
      [(ngModel)]="subject"
      required
    /> 
  
    <label for="message">Message:</label>
    <textarea
      id="message"
      name="message"
      [(ngModel)]="message"
      required
    ></textarea>

    <label for="recipientEmail">Recipient Email:</label>
    <input
      type="email"
      id="recipientEmail"
      name="recipientEmail"
      [(ngModel)]="recipientEmail"
      required
    />

    <button type="submit" [disabled]="!emailForm.form.valid">Send Email</button>
  </form>

  <p>{{ responseMessage }}</p>
</div>
</body>
