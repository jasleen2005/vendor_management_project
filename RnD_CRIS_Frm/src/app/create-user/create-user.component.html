<body>
  <div class="login-container">
    <header class="header">
      <div class="logo">
        <img src="assets/CRIS_logo.png" alt="CRIS Logo" class="logo-image">
      </div>
    </header> 


   <div class="create-user-container">
   <div class="create-user-card">
    <h2 class="create-user-title">Create New User</h2>
    <form (ngSubmit)="onCreateUser()" class="create-user-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" [(ngModel)]="username" name="username" required class="form-input" placeholder="Enter username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" [(ngModel)]="password" name="password" required class="form-input" placeholder="Enter password">
      </div>

      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" [(ngModel)]="role" name="role" required class="form-input">
          <option value="railway">Railway User</option>
          <option value="admin">Admin</option>
        </select> 
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit">Create User</button>
      </div>
    </form>

  </div>
  </div>
  </div>


</body>
